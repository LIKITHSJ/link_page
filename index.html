<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Growth Bridge</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: 'Helvetica Neue', Arial, sans-serif;
    background: linear-gradient(135deg, #0a1e3f 0%, #123a5e 50%, #0f2e4a 100%);
    position: relative;
    overflow: hidden;
    padding: 20px;
  }

  /* Subtle bridge-arc background decoration */
  body::before {
    content: '';
    position: absolute;
    bottom: -150px;
    left: 50%;
    transform: translateX(-50%);
    width: 900px;
    height: 450px;
    border: 3px solid rgba(46, 204, 113, 0.08);
    border-radius: 50%;
    border-bottom: none;
  }
  body::after {
    content: '';
    position: absolute;
    bottom: -220px;
    left: 50%;
    transform: translateX(-50%);
    width: 1100px;
    height: 550px;
    border: 2px solid rgba(46, 204, 113, 0.05);
    border-radius: 50%;
    border-bottom: none;
  }

  .card {
    position: relative;
    z-index: 2;
    background: rgba(255, 255, 255, 0.03);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(46, 204, 113, 0.15);
    border-radius: 24px;
    padding: 50px 40px;
    text-align: center;
    max-width: 420px;
    width: 100%;
    box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
  }

  .logo {
    width: 90px;
    height: 90px;
    margin: 0 auto 20px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .logo svg { width: 100%; height: 100%; }

  h1 {
    color: #ffffff;
    font-size: 26px;
    font-weight: 700;
    letter-spacing: 1px;
    margin-bottom: 4px;
  }
  h1 span { color: #2ecc71; }

  .tagline {
    color: rgba(255,255,255,0.5);
    font-size: 13px;
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 40px;
  }

  .btn {
    display: flex;
    align-items: center;
    gap: 14px;
    text-decoration: none;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    color: white;
    padding: 16px 24px;
    margin: 12px 0;
    border-radius: 14px;
    font-weight: 600;
    font-size: 16px;
    transition: all 0.25s ease;
  }
  .btn:hover {
    transform: translateY(-3px);
    border-color: #2ecc71;
    box-shadow: 0 10px 25px rgba(46, 204, 113, 0.2);
    background: rgba(46, 204, 113, 0.08);
  }
  .btn .icon {
    width: 22px;
    height: 22px;
    flex-shrink: 0;
  }
  .btn .icon svg { width: 100%; height: 100%; }

  .btn.insta:hover { border-color: #e1306c; box-shadow: 0 10px 25px rgba(225,48,108,0.2); }

  footer {
    margin-top: 36px;
    color: rgba(255,255,255,0.3);
    font-size: 11px;
    letter-spacing: 1px;
  }
</style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <img src="logo.png" alt="Growth Bridge Logo" style="width:100%; height:100%; object-fit:contain;">
    </div>
    <h1>GROWTH <span>BRIDGE</span></h1>
    <p class="tagline">Connect With Us</p>

    <a class="btn insta" href="https://instagram.com/growth._.bridge_" target="_blank">
      <span class="icon">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect x="2" y="2" width="20" height="20" rx="6" stroke="#e1306c" stroke-width="2"/>
          <circle cx="12" cy="12" r="5" stroke="#e1306c" stroke-width="2"/>
          <circle cx="18" cy="6" r="1.3" fill="#e1306c"/>
        </svg>
      </span>
      Instagram
    </a>

    <a class="btn" href="https://growth-bridge-k8ne.vercel.app" target="_blank">
      <span class="icon">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="12" cy="12" r="10" stroke="#2ecc71" stroke-width="2"/>
          <path d="M2 12h20M12 2c2.5 2.5 4 6 4 10s-1.5 7.5-4 10c-2.5-2.5-4-6-4-10s1.5-7.5 4-10z" stroke="#2ecc71" stroke-width="2"/>
        </svg>
      </span>
      Our Website
    </a>

    <footer>GROWTH BRIDGE © 2026</footer>
  </div>
</body>
</html>
